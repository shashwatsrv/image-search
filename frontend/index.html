<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic Image Search</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body data-theme="dark">
    <nav class="topbar">
      <div class="topbar-inner">
        <span class="brand">Semantic Search</span>
        <button id="theme-toggle" class="btn btn-pill btn-ghost" type="button">
          Switch to Light
        </button>
      </div>
    </nav>

    <main class="app">
      <section class="hero">
        <h1>Find images by meaning.</h1>
        <p>Minimal interface, semantic results, instant exploration.</p>
      </section>

      <section class="search-panel">
        <form id="search-form">
          <input
            id="query-input"
            type="text"
            placeholder="Try: foggy forest in the morning"
            autocomplete="off"
            required
          />
          <select id="k-select" aria-label="Number of results">
            <option value="12" selected>12</option>
            <option value="18">18</option>
            <option value="24">24</option>
            <option value="30">30</option>
          </select>
          <button class="btn btn-primary" type="submit">Search</button>
          <button id="surprise-btn" class="btn btn-pill btn-ghost" type="button">
            Surprise me
          </button>
        </form>
        <p class="hint">Press Enter to search</p>
      </section>

      <section id="status" class="status">Enter a query to start.</section>
      <section id="results" class="grid" aria-live="polite"></section>
      <div class="actions-row">
        <button id="load-more-btn" class="btn btn-pill btn-ghost hidden" type="button">
          Load more
        </button>
      </div>
    </main>

    <dialog id="lightbox" class="lightbox">
      <button id="lightbox-close" class="lightbox-close" type="button">Close</button>
      <img id="lightbox-image" alt="Expanded result" />
    </dialog>

    <script src="/frontend/script.js"></script>
  </body>
</html>
