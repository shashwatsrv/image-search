<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic Image Search</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Semantic Image Search</h1>
        <p>Search images by meaning using CLIP + FAISS</p>
      </header>

      <section class="search-panel">
        <form id="search-form">
          <input
            id="query-input"
            type="text"
            placeholder="Try: forest in morning fog"
            autocomplete="off"
            required
          />
          <select id="k-select" aria-label="Number of results">
            <option value="6">6 results</option>
            <option value="9" selected>9 results</option>
            <option value="12">12 results</option>
            <option value="15">15 results</option>
          </select>
          <button type="submit">Search</button>
        </form>
      </section>

      <section id="status" class="status">Enter a query to start.</section>
      <section id="results" class="grid" aria-live="polite"></section>
    </main>

    <script src="/frontend/script.js"></script>
  </body>
</html>
